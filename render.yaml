services:
  - type: web
    name: lobster-skill-platform
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --log-file -"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
    disk:
      name: lobster-data
      mountPath: /data
      sizeGB: 1
